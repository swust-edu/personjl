
<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Music Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;

    background:
    linear-gradient(
        135deg,
        #5B7FFF,
        #A855F7,
        #EC4899
    );

    overflow:hidden;
}

/* 背景光晕 */

body::before{

    content:"";

    position:absolute;

    width:600px;
    height:600px;

    border-radius:50%;

    background:
    rgba(255,255,255,.15);

    filter:blur(120px);

    top:-200px;
    left:-150px;
}

body::after{

    content:"";

    position:absolute;

    width:500px;
    height:500px;

    border-radius:50%;

    background:
    rgba(255,255,255,.12);

    filter:blur(100px);

    bottom:-150px;
    right:-100px;
}

/* 毛玻璃播放器 */

.player{

    position:relative;

    z-index:2;

    width:420px;

    padding:35px;

    border-radius:36px;

    background:
    rgba(255,255,255,.12);

    backdrop-filter:
    blur(30px);

    -webkit-backdrop-filter:
    blur(30px);

    border:
    1px solid rgba(255,255,255,.2);

    box-shadow:
    0 20px 60px rgba(0,0,0,.2);
}

/* 封面 */

.cover{

    width:220px;

    height:220px;

    margin:auto;

    border-radius:30px;

    background:
    rgba(255,255,255,.15);

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:70px;

    margin-bottom:25px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.15);
}

/* 标题 */

.title{

    color:#fff;

    text-align:center;

    font-size:28px;

    font-weight:700;

    margin-bottom:8px;
}

.artist{

    text-align:center;

    color:
    rgba(255,255,255,.75);

    margin-bottom:25px;
}

/* 文件选择 */

#fileInput{

    width:100%;

    margin-bottom:25px;

    color:white;
}

/* 控制按钮 */

.controls{

    display:flex;

    justify-content:center;

    gap:20px;

    margin-bottom:25px;
}

.controls button{

    width:55px;

    height:55px;

    border:none;

    border-radius:50%;

    cursor:pointer;

    color:white;

    font-size:20px;

    background:
    rgba(255,255,255,.15);

    backdrop-filter:blur(10px);

    transition:.3s;
}

.controls button:hover{

    transform:scale(1.08);
}

.play{

    width:70px !important;

    height:70px !important;

    font-size:24px !important;
}

/* 进度条 */

#progress{

    width:100%;

    appearance:none;

    height:5px;

    border-radius:20px;

    background:
    rgba(255,255,255,.2);

    cursor:pointer;
}

#progress::-webkit-slider-thumb{

    appearance:none;

    width:15px;

    height:15px;

    border-radius:50%;

    background:white;
}

/* 时间 */

.time{

    display:flex;

    justify-content:space-between;

    margin-top:10px;

    color:
    rgba(255,255,255,.8);

    font-size:13px;
}

</style>
</head>

<body>

<div class="player">

    <div class="cover">
        🎵
    </div>

    <h2 id="songTitle" class="title">
        未选择音乐
    </h2>

    <p class="artist">
        Apple Music Style Player
    </p>

    <input
        type="file"
        id="fileInput"
        accept="audio/*"
    >

    <div class="controls">

        <button>
            ⏮
        </button>

        <button
            class="play"
            id="playBtn">
            ▶
        </button>

        <button>
            ⏭
        </button>

    </div>

    <input
        type="range"
        id="progress"
        value="0"
    >

    <div class="time">

        <span id="currentTime">
            00:00
        </span>

        <span id="duration">
            00:00
        </span>

    </div>

    <audio id="audio"></audio>

</div>

<script>

const audio =
document.getElementById("audio");

const playBtn =
document.getElementById("playBtn");

const fileInput =
document.getElementById("fileInput");

const progress =
document.getElementById("progress");

const currentTime =
document.getElementById("currentTime");

const duration =
document.getElementById("duration");

const songTitle =
document.getElementById("songTitle");

/* 导入音乐 */

fileInput.addEventListener(
"change",
e=>{

    const file =
    e.target.files[0];

    if(!file) return;

    audio.src =
    URL.createObjectURL(file);

    songTitle.innerText =
    file.name;
});

/* 播放暂停 */

playBtn.addEventListener(
"click",
()=>{

    if(audio.paused){

        audio.play();

        playBtn.innerText =
        "⏸";

    }else{

        audio.pause();

        playBtn.innerText =
        "▶";
    }
});

/* 加载完成 */

audio.addEventListener(
"loadedmetadata",
()=>{

    duration.innerText =
    formatTime(audio.duration);
});

/* 更新时间 */

audio.addEventListener(
"timeupdate",
()=>{

    progress.value =
    audio.currentTime /
    audio.duration * 100 || 0;

    currentTime.innerText =
    formatTime(audio.currentTime);
});

/* 拖动进度条 */

progress.addEventListener(
"input",
()=>{

    audio.currentTime =
    progress.value / 100 *
    audio.duration;
});

function formatTime(sec){

    let min =
    Math.floor(sec/60);

    let second =
    Math.floor(sec%60);

    return (
        String(min)
        .padStart(2,"0")
        +
        ":"
        +
        String(second)
        .padStart(2,"0")
    );
}

</script>

</body>
</html>
